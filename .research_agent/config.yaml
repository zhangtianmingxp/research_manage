auto_next: false
auto_execute_prompt: false
auto_commit: false
auto_push: false
prompt_dir: ans_qes
prompt_prefix: prompt
result_prefix: result
default_language: zh-CN
markdown_docs_language: zh-CN
required_project_rules: PROJECT_RULES.md
context_mode: low
max_recent_results_to_read: 3
prefer_context_summary: true
avoid_full_reads:
  logs: true
  generated_outputs: true
  notebooks: true
  manifests: true
  large_markdown: true
require_user_confirmation:
  before_execute: true
  before_commit: true
  before_push: true
